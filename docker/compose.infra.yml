x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres_user:
    image: postgres:15-alpine
    container_name: postgres_user
    restart: unless-stopped
    env_file:
      - ../backend/service_user/.env
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_service -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - recipe_network



volumes:
  postgres_user_data:
    driver: local


networks:
  recipe_network:
    driver: bridge
