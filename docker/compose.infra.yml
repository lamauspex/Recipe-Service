x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ==========================================
  # RabbitMQ
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: rabbitmq-password
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - recipe_network

  # ==========================================
  # PostgreSQL для User Service
  # ==========================================
  postgres_user:
    image: postgres:15-alpine
    container_name: postgres_user
    restart: unless-stopped
    env_file:
      - ../backend/service_user/.env
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user_service -d users_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - recipe_network

  # ==========================================
  # PostgreSQL для Recipe Service
  # ==========================================
  postgres_recipe:
    image: postgres:15-alpine
    container_name: postgres_recipe
    restart: unless-stopped
    env_file:
      - ../backend/service_recipe/.env
    volumes:
      - postgres_recipe_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U recipe_service -d recipe_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - recipe_network

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: meilisearch
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=meili-master-key-secure-change-me
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7700/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - recipe_network

volumes:
  rabbitmq_data:
    driver: local
  postgres_user_data:
    driver: local
  postgres_recipe_data:
    driver: local
  meilisearch_data:
    driver: local

networks:
  recipe_network:
    driver: bridge
