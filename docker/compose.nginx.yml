services:
  # ==========================================
  # Nginx API Gateway
  # ==========================================
  nginx-gateway:
    image: nginx:alpine
    container_name: nginx_gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Основной конфиг
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Конфиги серверов
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      # Swagger UI документация
      - ../nginx/docs:/usr/share/nginx/html/docs:ro
      # Логи Nginx
      - ../logs/nginx:/var/log/nginx
    depends_on:
      - service_user
      - service_recipe
      # service_user_grpc нужен для gRPC между сервисами (не для Nginx)
    networks:
      - recipe_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  recipe_network:
    driver: bridge