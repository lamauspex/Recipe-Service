services:
  # ==========================================
  # User Service
  # ==========================================
  service_user:
    build:
      context: ..
      dockerfile: backend/service_user/Dockerfile
    container_name: service_user
    restart: unless-stopped
    env_file:
      - ../backend/service_user/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres_user:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - recipe_network
    volumes:
      - ../logs/service_user:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: &app-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  # ==========================================
  # gRPC сервер User Service (отдельный контейнер)
  # ==========================================
  service_user_grpc:
    build:
      context: ..
      dockerfile: backend/service_user/Dockerfile
    container_name: service_user_grpc
    restart: unless-stopped
    entrypoint: ["python", "-m", "backend.service_user.src.infrastructure.grpc_server"]
    env_file:
      - ../backend/service_user/.env
    environment:
      - HOST=0.0.0.0
      - GRPC_PORT=50051
    depends_on:
      - service_user
    networks:
      - recipe_network
    ports:
      - "50051:50051"
    volumes:
      - ../logs/service_user_grpc:/app/logs
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *app-logging

  # ==========================================
  # Recipe Service
  # ==========================================
  service_recipe:
    build:
      context: ..
      dockerfile: backend/service_recipe/Dockerfile
    container_name: service_recipe
    restart: unless-stopped
    env_file:
      - ../backend/service_recipe/.env
    ports:
      - "8001:8000"
    environment:
      - USER_SERVICE_HOST=service_user_grpc
      - USER_SERVICE_PORT=50051
    depends_on:
      postgres_recipe:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - recipe_network
    volumes:
      - ../logs/service_recipe:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *app-logging

  # ==========================================
  # Search Service
  # ==========================================
  service_search:
    build:
      context: ..
      dockerfile: backend/service_search/Dockerfile
    container_name: service_search
    restart: unless-stopped
    env_file:
      - ../backend/service_search/.env
    ports:
      - "8002:8002"
      - "50052:50052"
    environment:
      - SEARCH_SERVICE_MEILISEARCH_HOST=http://meilisearch:7700
      - SEARCH_SERVICE_RABBITMQ_URL=amqp://admin:rabbitmq-password@rabbitmq:5672/
    depends_on:
      meilisearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - recipe_network
    volumes:
      - ../logs/service_search:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *app-logging


networks:
  recipe_network:
    driver: bridge

volumes:
  logs_user:
    driver: local
  logs_recipe:
    driver: local
  logs_search:
    driver: local
  logs_user_grpc:
    driver: local