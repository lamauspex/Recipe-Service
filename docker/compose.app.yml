services:
  service_user:
    build:
      context: ..
      dockerfile: backend/service_user/Dockerfile
    container_name: service_user
    restart: unless-stopped
    env_file:
      - ../backend/service_user/.env
    ports:
      - "8001:8000"
    depends_on:
      postgres_user:
        condition: service_healthy
    networks:
      - recipe_network
    volumes:
      - ../logs/service_user:/app/logs

