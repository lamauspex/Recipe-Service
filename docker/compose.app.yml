services:
  service_user:
    build:
      context: ..
      dockerfile: backend/service_user/Dockerfile
    container_name: service_user
    restart: unless-stopped
    env_file:
      - ../backend/service_user/.env
    ports:
      - "8000:8000"
      - "50051:50051"
    environment:
      - GRPC_PORT=50051
    depends_on:
      postgres_user:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - recipe_network
    volumes:
      - ../logs/service_user:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  service_recipe:
    build:
      context: ..
      dockerfile: backend/service_recipe/Dockerfile
    container_name: service_recipe
    restart: unless-stopped
    env_file:
      - ../backend/service_recipe/.env
    ports:
      - "8001:8000"
    environment:
      - USER_SERVICE_HOST=user_service
      - USER_SERVICE_PORT=50051
    depends_on:
      postgres_recipe:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - recipe_network
    volumes:
      - ../logs/service_recipe:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s