  # ==========================================
  # PostgreSQL для Recipe Service
  # ==========================================
services:
  postgres_recipe:
    image: postgres:15-alpine
    container_name: postgres_recipe
    restart: unless-stopped
    env_file:
      - ../backend/service_recipe/.env
    volumes:
      - postgres_recipe_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    labels:
      - "app.layer=database"
      - "app.domain=recipe"
      - "app.component=postgres"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U recipe_service -d recipe_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - recipe_network