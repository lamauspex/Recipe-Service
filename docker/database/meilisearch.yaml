services:
  # ==========================================
  # Meilisearch
  # ==========================================
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: meilisearch
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=meili-master-key-secure-change-me
      - MEILI_NO_ANALYTICS=true
      - RUST_LOG=warn  
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health > /dev/null 2>&1"]
      interval: 60s  
      timeout: 5s
      retries: 3  
    networks:
      - recipe_network