include:
  - compose.infra.yml
  - compose.app.yml
  - docker/compose.nginx.yml


# Общие переменные
x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# Общие сети
networks:
  recipe_network:
    driver: bridge

# Общие тома
volumes:
  rabbitmq_data:
    driver: local
  postgres_user_data:
    driver: local
  postgres_recipe_data:
    driver: local
  meilisearch_data:
    driver: local
  logs_user:
    driver: local
  logs_recipe:
    driver: local
  logs_search:
    driver: local