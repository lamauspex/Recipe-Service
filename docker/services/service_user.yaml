# ==========================================
# User Service
# ==========================================
services:
  service_user:
    build:
      context: ../..
      dockerfile: backend/service_user/Dockerfile
    container_name: service_user
    restart: unless-stopped
    env_file:
      - ../../backend/service_user/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres_user:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - recipe_network
    volumes:
      - ../logs/service_user:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==========================================
# gRPC сервер User Service
# ==========================================
  service_user_grpc:
    build:
      context: ../..
      dockerfile: backend/service_user/Dockerfile
    container_name: service_user_grpc
    restart: unless-stopped
    entrypoint: ["python", "-m", "backend.service_user.src.infrastructure.grpc_server"]
    env_file:
      - ../../backend/service_user/.env
    environment:
      - HOST=0.0.0.0
      - GRPC_PORT=50051
    depends_on:
      - service_user
    networks:
      - recipe_network
    ports:
      - "50051:50051"
    volumes:
      - ../logs/service_user_grpc:/app/logs
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
