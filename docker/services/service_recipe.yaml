  # ==========================================
  # Recipe Service
  # ==========================================
services:
  service_recipe:
    build:
      context: ../..
      dockerfile: backend/service_recipe/Dockerfile
    container_name: service_recipe
    restart: unless-stopped
    env_file:
      - ../../backend/service_recipe/.env
    ports:
      - "8001:8000"
    depends_on:
      postgres_recipe:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - recipe_network
    labels:
      - "app.layer=services"
      - "app.domain=recipe"
      - "app.component=api"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"