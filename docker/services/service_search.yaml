  # ==========================================
  # Search Service
  # ==========================================
services:
  service_search:
    build:
      context: ../..
      dockerfile: backend/service_search/Dockerfile
    container_name: service_search
    restart: unless-stopped
    env_file:
      - ../../backend/service_search/.env
    ports:
      - "8002:8002"
      - "50052:50052"
    environment:
      - SEARCH_SERVICE_MEILISEARCH_HOST=http://meilisearch:7700
      - SEARCH_SERVICE_RABBITMQ_URL=amqp://admin:rabbitmq-password@rabbitmq:5672/
    depends_on:
      meilisearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - recipe_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"